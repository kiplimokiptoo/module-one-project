<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Web Tutorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-panel" style="margin: 5rem auto; max-width: 420px;">
        <h3>Sign in first</h3>
        <form class="login-form" action="home.html" method="GET">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn">Login</button>
                <p class="login-note">No account? <a href="signup.html">Register here</a></p>
        </form>
    </div>
</body>
</html>
