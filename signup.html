<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Web Tutorial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-panel" style="margin: 5rem auto; max-width: 420px;">
        <h3>Create your account</h3>
        <form class="login-form" action="home.html" method="GET">
            <label for="newusername">Username</label>
            <input type="text" id="newusername" name="newusername" placeholder="Username" required>

            <label for="newpassword">Password</label>
            <input type="password" id="newpassword" name="newpassword" placeholder="Password" required>

            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" required>

            <button type="submit" class="login-btn">Sign Up</button>
            <p class="login-note">Already have an account? <a href="index.html">Login</a></p>
        </form>
    </div>
</body>
</html>
